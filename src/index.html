<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟计时器</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #1a1a2e;
    color: #e0e0e0;
    transition: background-color 0.5s ease;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 400;
    color: #888;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
  }

  #timer {
    font-size: 8rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: #ffffff;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
    transition: font-size 0.5s ease, font-weight 0.5s ease, color 0.5s ease;
  }

  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ---- 0.0.2: 按钮样式改为圆角矩形、细边框、实心深蓝背景 ---- */
  button {
    padding: 0.75rem 2rem;
    font-size: 1rem;
    border: 1px solid #666;
    border-radius: 25px;
    background: #1a1a2e;
    color: #ccc;
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

  button:hover:not(:disabled) {
    border-color: #999;
    color: #fff;
    background: #222244;
  }

  button:active:not(:disabled) {
    background-color: #2a2a4e;
  }

  /* ---- 0.0.2: 禁用按钮使用明确灰色文字（非 opacity） ---- */
  button:disabled {
    color: #666;
    cursor: not-allowed;
    opacity: 1;
  }

  /* ---- 归零高亮 ---- */
  body.finished {
    background-color: #1b5e20;
  }

  body.finished #timer {
    font-size: 10rem;
    font-weight: 700;
    color: #a5d6a7;
    animation: pulse 1.2s ease-in-out infinite;
  }

  body.finished button:not(:disabled) {
    border-color: #a5d6a7;
    color: #a5d6a7;
  }

  body.finished button:hover:not(:disabled) {
    background-color: rgba(165, 214, 167, 0.12);
  }

  body.finished button:disabled {
    color: #4a7a4a;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }

</style>
</head>
<body>
<div class="container">
  <h1>番茄钟计时器</h1>
  <div id="timer">25:00</div>
  <div class="controls">
    <button id="btn-start">开始</button>
    <button id="btn-pause" disabled>暂停</button>
    <button id="btn-reset">重置</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  var WORK_SECONDS = 25 * 60;
  var TIMER_TICK_MS = 1000;

  var timerEl   = document.getElementById("timer");
  var btnStart  = document.getElementById("btn-start");
  var btnPause  = document.getElementById("btn-pause");
  var btnReset  = document.getElementById("btn-reset");

  var state      = "IDLE";
  var remaining  = WORK_SECONDS;
  var intervalId = null;

  function formatMMSS(totalSeconds) {
    var m = Math.floor(totalSeconds / 60);
    var s = totalSeconds % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function updateDisplay() {
    timerEl.textContent = formatMMSS(remaining);
  }

  function setButtonStates(startEnabled, pauseEnabled, startText) {
    btnStart.disabled = !startEnabled;
    btnPause.disabled = !pauseEnabled;
    if (startText !== undefined) {
      btnStart.textContent = startText;
    }
  }

  function clearTick() {
    if (intervalId !== null) {
      clearInterval(intervalId);
      intervalId = null;
    }
  }

  function applyFinishedClass(isFinished) {
    if (isFinished) {
      document.body.classList.add("finished");
    } else {
      document.body.classList.remove("finished");
    }
  }

  function transition(newState) {
    state = newState;

    switch (state) {
      case "IDLE":
        clearTick();
        remaining = WORK_SECONDS;
        updateDisplay();
        applyFinishedClass(false);
        setButtonStates(true, false, "开始");
        break;

      case "RUNNING":
        applyFinishedClass(false);
        setButtonStates(false, true, "继续");
        intervalId = setInterval(onTick, TIMER_TICK_MS);
        break;

      case "PAUSED":
        clearTick();
        setButtonStates(true, false, "继续");
        break;

      case "FINISHED":
        clearTick();
        remaining = 0;
        updateDisplay();
        applyFinishedClass(true);
        setButtonStates(false, false);
        break;
    }
  }

  function onTick() {
    if (state !== "RUNNING") return;
    remaining -= 1;
    updateDisplay();
    if (remaining <= 0) {
      transition("FINISHED");
    }
  }

  btnStart.addEventListener("click", function () {
    if (state === "IDLE" || state === "PAUSED") {
      transition("RUNNING");
    }
  });

  btnPause.addEventListener("click", function () {
    if (state === "RUNNING") {
      transition("PAUSED");
    }
  });

  btnReset.addEventListener("click", function () {
    if (state === "RUNNING" || state === "PAUSED" || state === "FINISHED") {
      transition("IDLE");
    }
  });

  updateDisplay();
})();
</script>
</body>
</html>
